<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RNTUJ</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

    <!-- Nav Section -->
    <div style="background-color: #fff; padding: 10px 15px;">
        <div class="hero_section border_R10">

            <div class="hero_container nav_padding">

                <header class="header_container header m-0">

                    <!-- Logo -->
                    <a href="index.html" class="logo">
                        <img src="assets/logo.png" alt="RNTU Logo">
                    </a>

                    <!-- Hamburger -->
                    <div class="hamburger" id="hamburger">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>

                    <!-- Navbar -->
                    <div class="navbar_custom" id="navbar">

                        <!-- Nav Links -->
                        <div class="nav-links">
                            <div class="nav-links">
                                <a href="index.html">Home</a>
                                <a href="aboutus.html">About</a>
                                <a href="guidelines&policies.html">Guidelines</a>
                                <a href="form.html" class="active">Submit Article</a>
                                <a href="contactus.html">Contact</a>
                            </div>
                        </div>

                        <!-- Search -->
                        <div class="search-box">
                            <input type="text" placeholder="Search.....">

                            <button class="search-btn">
                                <img src="assets/home_page/search_icon.png" alt="">
                            </button>
                        </div>

                        <!-- Login -->
                        <a href="#" class="login-btn">
                            <img src="assets/home_page/login_icon.png" alt="">
                            Login / Register
                        </a>

                    </div>
                </header>
            </div>
        </div>
    </div>

    <div class="s__container_custom">

        <div class="rjf-header">
            <span class="guide-badge">SUBMISSION FORM</span>
            <h1 class="rjf-title">Manuscript Submission Information</h1>
        </div>

        <form>

            <!-- Author Information -->
            <div class="rjf-card">
                <div class="rjf-card-heading">
                    Name of First Author/Head of Team to give presentation
                </div>

                <div class="row">

                    <div class="col-lg-3 col-md-6">
                        <label>Full Name</label>
                        <input type="text" class="rjf-input">
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label>Mobile No.</label>
                        <input type="text" class="rjf-input">
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label>Email Address</label>
                        <input type="email" class="rjf-input">
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label>Affiliating Institute</label>
                        <input type="text" class="rjf-input">
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label>Department</label>
                        <input type="text" class="rjf-input">
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label>ORCID ID</label>
                        <input type="text" class="rjf-input">
                    </div>

                    <div class="col-12">
                        <label>Affiliating Institute Address</label>
                        <textarea class="rjf-textarea"></textarea>
                    </div>

                </div>
            </div>

            <!-- Co Authors -->
            <div class="rjf-card">

                <div class="rjf-card-heading">
                    Name and Mobile Number of Co-Authors
                </div>

                <div id="author-container">

                    <div class="row author-block">

                        <div class="col-lg-3 col-md-6">
                            <label>Full Name</label>
                            <input type="text" class="rjf-input">
                        </div>

                        <div class="col-lg-3 col-md-6">
                            <label>Email Address</label>
                            <input type="email" class="rjf-input">
                        </div>

                        <div class="col-lg-3 col-md-6">
                            <label>Affiliation</label>
                            <input type="text" class="rjf-input">
                        </div>

                        <div class="col-lg-3 col-md-6">
                            <label>ORCID ID</label>
                            <input type="text" class="rjf-input">
                        </div>

                    </div>

                </div>

                <div class="rjf-btn-right">
                    <button type="button" class="rjf-btn">Add Author +</button>
                </div>

            </div>

            <!-- Abstract -->
            <div class="rjf-card">

                <div class="rjf-card-heading">
                    Abstract Details
                </div>

                <div class="row">

                    <div class="col-12">
                        <label>Select Journal Type</label>

                        <select class="rjf-input">
                            <option>Anusandhan</option>
                            <option>Shodhaytan</option>
                        </select>

                    </div>

                    <div class="col-12">
                        <label>Manuscript Title</label>
                        <input type="text" class="rjf-input">
                    </div>

                    <div class="col-12">
                        <label>Abstract of Research / Project</label>
                        <textarea rows="8" class="rjf-textarea"></textarea>
                    </div>

                    <div class="col-12">
                        <label>Keyword</label>
                        <div class="row">
                            <div class="col-lg-3 col-md-6">
                                <input type="text" class="rjf-input" placeholder="Keyword">
                            </div>

                            <div class="col-lg-3 col-md-6">
                                <input type="text" class="rjf-input" placeholder="Keyword">
                            </div>

                            <div class="col-lg-3 col-md-6">
                                <input type="text" class="rjf-input" placeholder="Keyword">
                            </div>

                            <div class="col-lg-3 col-md-6">
                                <input type="text" class="rjf-input" placeholder="Keyword">
                            </div>
                            <div class="col-lg-3 col-md-6">
                                <input type="text" class="rjf-input" placeholder="Keyword">
                            </div>

                            <div class="col-lg-3 col-md-6">
                                <input type="text" class="rjf-input" placeholder="Keyword">
                            </div>

                            <div class="col-lg-3 col-md-6">
                                <input type="text" class="rjf-input" placeholder="Keyword">
                            </div>

                            <div class="col-lg-3 col-md-6">
                                <input type="text" class="rjf-input" placeholder="Keyword">
                            </div>
                        </div>
                    </div>

                    <div class="col-6">
                        <label>Upload Manuscript PDF</label>
                        <input type="file" class="rjf-input" style="padding: 10px 15px;">
                    </div>

                    <div class="col-6">
                        <label>Upload Source File (DOCX)</label>
                        <input type="file" class="rjf-input" style="padding: 10px 15px;">

                    </div>



                </div>

            </div>

            <!-- Reviewers -->
            <div class="rjf-card">

                <div class="rjf-card-heading">
                    Recommended Reviewers
                </div>

                <div class="row">

                    <div class="col-lg-3 col-md-6">
                        <label>Full Name</label>
                        <input type="text" class="rjf-input">
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label>Email Address</label>
                        <input type="email" class="rjf-input">
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label>Institution</label>
                        <input type="text" class="rjf-input">
                    </div>

                    <div class="col-lg-3 col-md-6">
                        <label>Area of Expertise</label>
                        <input type="text" class="rjf-input">
                    </div>

                </div>

                <div class="rjf-btn-right">
                    <button type="button" class="rjf-btn">Add Reviewer +</button>
                </div>

            </div>

            <!-- Declaration -->
            <div class="rjf-card">

                <div class="rjf-card-heading">
                    Author Declaration
                </div>

                <div class="rjf-checklist">

                    <label><input type="checkbox"> The manuscript is original and has not been published
                        previously.</label>

                    <label><input type="checkbox"> The manuscript is not under consideration by another journal.</label>

                    <label><input type="checkbox"> All authors have approved the submitted manuscript.</label>

                    <label><input type="checkbox"> Ethical approval has been obtained where required.</label>

                    <label><input type="checkbox"> Data presented are accurate and authentic.</label>

                </div>

            </div>

            <!-- Signature -->
            <div class="rjf-card">

                <div class="rjf-card-heading">
                    Corresponding Author Signature
                </div>

                <div class="row">

                    <div class="col-lg-4">
                        <label>Full Name</label>
                        <input type="text" class="rjf-input">
                    </div>

                    <div class="col-lg-4">
                        <label>Signature</label>
                        <input type="file" class="rjf-input" style="padding: 10px 15px;">
                    </div>


                    <div class="col-lg-4">
                        <label>Date</label>
                        <input type="date" class="rjf-input">
                    </div>

                </div>

                <div class="rjf-submit-section">

                    <label>
                        <input type="checkbox">
                        I Have Read All Instructions of RNTU Journals.
                    </label>

                    <button type="submit" class="rjf-submit-btn">
                        Submit
                    </button>

                </div>

            </div>

        </form>

    </div>
</body>

</html>
